name: Build ocpl-coq

# Triggers: run on push, PR, or manual dispatch
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # If ocpl-coq is a git submodule, uncomment below:
          # submodules: recursive

      # Breadcrumb: ocaml/setup-ocaml is the de-facto standard for OCaml CI
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 4.07.1
          opam-repositories: |
            default: https://opam.ocaml.org
            coq-released: https://coq.inria.fr/opam/released
          opam-disable-sandboxing: true

      - name: Install Ubuntu dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential m4 pkg-config git python3

      - name: Create opam switch
        run: |
          opam switch create ocpl-coq-8.9.1-ocaml-4.07.1 ocaml-base-compiler.4.07.1 || \
          opam switch set ocpl-coq-8.9.1-ocaml-4.07.1
          eval $(opam env --switch=ocpl-coq-8.9.1-ocaml-4.07.1) && ocaml -version

      - name: Install Coq 8.9.1
        run: |
          eval $(opam env --switch=ocpl-coq-8.9.1-ocaml-4.07.1)
          opam update
          opam install -y coq.8.9.1
        timeout-minutes: 60

      - name: Verify Coq installation
        run: |
          eval $(opam env --switch=ocpl-coq-8.9.1-ocaml-4.07.1)
          coqc --version

      - name: Build ocpl-coq
        run: |
          eval $(opam env --switch=ocpl-coq-8.9.1-ocaml-4.07.1)
          make
        timeout-minutes: 60
